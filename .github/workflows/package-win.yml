name: Package & Verify Windows

on:
  workflow_dispatch:
  push:
    branches: [feat/windows-support, feat/rebrand-catclaw]

jobs:
  build-and-verify:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # ── Setup ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────
      - name: Bootstrap runtime (downloads OpenClaw + Node for Windows)
        run: npm run bootstrap

      - name: Verify runtime files exist
        run: |
          if (!(Test-Path ".catclaw-runtime/runtime/win/node.exe")) {
            Write-Error "Windows Node runtime not found"
            exit 1
          }
          if (!(Test-Path ".catclaw-runtime/openclaw/openclaw.mjs")) {
            Write-Error "OpenClaw entry not found"
            exit 1
          }
          Write-Host "Runtime files OK"
        shell: pwsh

      - name: Build app bundles
        run: npm run build

      - name: Verify package resources
        run: node scripts/verify-package-resources.mjs

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      # ── Package ──────────────────────────────────────────────────
      - name: Package Windows NSIS installer
        run: npx electron-builder --win --publish never

      - name: Verify installer exists
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Where-Object { $_.Name -like "*Setup*" }
          if (!$exe) {
            Write-Error "No installer .exe found in dist/"
            exit 1
          }
          Write-Host "Installer: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"
        shell: pwsh

      # ── Smoke Test ───────────────────────────────────────────────
      - name: Smoke test - launch app and verify startup
        run: |
          # Find the unpacked exe (arch dir varies: win-unpacked, win-arm64-unpacked, etc.)
          $appExe = Get-ChildItem -Path dist -Recurse -Filter "CatClaw.exe" |
            Where-Object { $_.DirectoryName -like "*unpacked*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (!$appExe -or !(Test-Path $appExe)) {
            Write-Error "Unpacked CatClaw.exe not found"
            exit 1
          }

          Write-Host "Launching: $appExe"

          # Start the Electron app
          $proc = Start-Process -FilePath $appExe -PassThru

          # Wait up to 15 seconds for it to stay alive (not crash immediately)
          $crashed = $false
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 1
            if ($proc.HasExited) {
              $crashed = $true
              break
            }
          }

          if ($crashed) {
            Write-Error "App crashed on startup (exit code: $($proc.ExitCode))"
            exit 1
          }

          Write-Host "App running (PID: $($proc.Id)) after 15s - startup OK"

          # Check that the bundled Node runtime is reachable
          $nodeExe = Join-Path (Split-Path $appExe) "resources/runtime/win/node.exe"
          if (Test-Path $nodeExe) {
            $nodeVer = & $nodeExe --version 2>&1
            Write-Host "Bundled Node: $nodeVer"
          } else {
            Write-Warning "Bundled node.exe not found at expected path (non-fatal)"
          }

          # Gracefully stop
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host "Smoke test passed"
        shell: pwsh

      # ── Upload ───────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: catclaw-win-installer
          path: dist/*Setup*.exe
          retention-days: 7

      - name: Upload unpacked app (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: catclaw-win-unpacked-debug
          path: dist/*unpacked*/
          retention-days: 3
